version: '3.9'

services:
  app:
    image: dogiakos/medicine-cabinet:latest
    container_name: medicine-cabinet
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicabinet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medicabinet_db}
      POSTGRES_HOST: db
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: medicine-cabinet-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicabinet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medicabinet_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
