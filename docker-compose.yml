version: '3.9'

services:
  app:
    image: dogiakos/medicine-cabinet:latest
    container_name: medicine-cabinet
    restart: always
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicabinet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medicabinet_db}
      POSTGRES_HOST: db
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: medicine-cabinet-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medicabinet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medicabinet_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medicabinet} -d ${POSTGRES_DB:-medicabinet_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
