name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build . \
            --tag ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:${{ github.sha }} \
            --tag ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:latest

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:${{ github.sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:latest
