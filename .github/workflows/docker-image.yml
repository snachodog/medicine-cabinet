name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build . \
            --tag ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:${{ github.sha }} \
            --tag ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:latest

      - name: Push image
        if: github.event_name == 'push'
        run: |
          docker push ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:${{ github.sha }}
          docker push ${{ vars.DOCKER_USERNAME }}/medicine-cabinet:latest

      - name: Notify via ntfy
        if: always() && github.event_name == 'push'
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.NTFY_TOKEN }}" \
            -H "Title: Medicine Cabinet CI — ${{ job.status }}" \
            -H "Tags: ${{ job.status == 'success' && 'white_check_mark' || 'x' }}" \
            -d "Build ${{ github.sha }} ${{ job.status }} on branch ${{ github.ref_name }}" \
            ${{ secrets.NTFY_URL }}
