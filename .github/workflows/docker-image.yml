name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to DockerHub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend Docker image
        run: |
          docker build ./backend --file ./backend/Dockerfile \
            --tag medicine-cabinet-backend:${{ github.sha }}

      - name: Build frontend Docker image
        run: |
          docker build ./frontend --file ./frontend/Dockerfile \
            --tag medicine-cabinet-frontend:${{ github.sha }}

      # Uncomment below to push images to Docker Hub once registry is configured
      #- name: Push backend image
      #  if: github.event_name == 'push'
      #  run: docker push medicine-cabinet-backend:${{ github.sha }}
      #- name: Push frontend image
      #  if: github.event_name == 'push'
      #  run: docker push medicine-cabinet-frontend:${{ github.sha }}
